tax_year: 2025
capital_gains_inclusion_rate: "0.50"
superficial_loss_window_days: 30
loss_carry_back_years: 3
record_retention_years: 6

# Reward tax treatment: "discount" (ACB=$0, not income) or "income" (FMV as ACB, taxable).
# Shakepay's help centre states rewards are "not taxable at receipt"; CRA's position on
# personal credit card cashback supports the discount analogy.  No CRA ruling exists
# specifically for crypto rewards — users may override these defaults per their situation.
# Any reward subtype not listed here defaults to "income" (conservative fallback).
reward_treatment:
  reward_shake: discount      # ShakingSats + Shakesquads — loyalty engagement rewards
  reward_cashback: discount   # Shakepay Card BTC cashback — direct credit card analogy

federal:
  schedule_3_crypto_line: 10
  t1_taxable_gains_line: 12700

quebec:
  tp1_crypto_checkbox_line: 24
  tp1_taxable_gains_line: 139
  crypto_form: "TP-21.4.39-V"
