# Supported currencies for sirop rate lookups.
#
# fiat: currencies that have Bank of Canada Valet API series codes.
#   boc_series: the BoC series identifier (e.g. FXUSDCAD for USD→CAD).
#
# crypto: assets supported for historical price lookups.
#   display_name:      human-readable name used in reports.
#   mempool_supported: true if mempool.space historical-price is available.
#                      sirop is BTC-only; this flag is always true for BTC.

fiat:
  USD:
    boc_series: FXUSDCAD

crypto:
  BTC:
    display_name: "Bitcoin"
    mempool_supported: true
