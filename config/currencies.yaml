# Supported currencies for sirop rate lookups.
#
# fiat: currencies that have Bank of Canada Valet API series codes.
#   boc_series: the BoC series identifier (e.g. FXUSDCAD for USD→CAD).
#
# crypto: assets supported for historical price lookups.
#   display_name:      human-readable name used in reports.
#   coingecko_id:      CoinGecko coin ID for the public history endpoint.
#                      Requires COINGECKO_API_KEY in .env (free Demo tier).
#                      Demo plan covers the last 365 days of history.
#   mempool_supported: true if mempool.space historical-price is available
#                      (BTC only). When true, mempool is tried first and
#                      CoinGecko is used as a fallback.
#   kraken_pair:       Kraken OHLC trading pair (e.g. XETHZUSD). Used as a
#                      fallback when CoinGecko lacks data (e.g. dates older
#                      than 365 days on the Demo plan). Free, no auth required.
#                      Source: https://docs.kraken.com/api/docs/rest-api/get-ohlc-data

fiat:
  USD:
    boc_series: FXUSDCAD

crypto:
  BTC:
    display_name: "Bitcoin"
    coingecko_id: "bitcoin"
    mempool_supported: true
    kraken_pair: "XXBTZUSD"
  ETH:
    display_name: "Ethereum"
    coingecko_id: "ethereum"
    mempool_supported: false
    kraken_pair: "XETHZUSD"
  SOL:
    display_name: "Solana"
    coingecko_id: "solana"
    mempool_supported: false
    kraken_pair: "SOLUSD"
  RPL:
    display_name: "Rocket Pool"
    coingecko_id: "rocket-pool"
    mempool_supported: false
    kraken_pair: "RPLUSD"
