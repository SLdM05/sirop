name: "Shakepay"
# Shakepay exports transaction history as multiple CSV files by currency type
# (BTC/ETH activity, CAD transactions, USD transactions).  The importer must
# accept and merge all files from a single export.  Files are identified by
# their header row, not by filename.
#
# This config targets the 2025 export format.  Column names changed from the
# earlier format:
#   "Transaction Type" → "Type"
#   "Debit Currency"   → "Asset Debited"
#   "Credit Currency"  → "Asset Credited"
# Columns removed: "Direction", "Source / Destination", "Blockchain Transaction ID"
# Columns added:   "Market Value", "Market Value Currency", "Book Cost",
#                  "Book Cost Currency", "Description"
#
# Full column spec: docs/ref/transaction-import-formats.md §1
date_column: "Date"
# Shakepay 2025 timestamps: "2025-03-17 09:47:31" — space-separated, no
# timezone offset.  datetime.fromisoformat() accepts this form; the base
# importer treats naive datetimes as UTC.  Pre-2025 exports used ISO 8601
# with a bare "+HH" offset ("2022-09-10T00:36:12+00") — also accepted by
# fromisoformat (Python 3.11+).
date_format: "iso8601"
columns:
  transaction_type: "Type"
  amount_debited: "Amount Debited"
  debit_currency: "Asset Debited"
  amount_credited: "Amount Credited"
  credit_currency: "Asset Credited"
  txid: "Description"
# "Buy / Sell Rate" and "Spot Rate" are Shakepay's internal/proprietary rates —
# NOT Bank of Canada rates.  Store in the raw record for audit trail purposes
# but NEVER pass to the calculation engine or use for ACB.
# "Market Value" and "Book Cost" are Shakepay's own computed values — also
# NOT Bank of Canada rates and must never be used for ACB.
ignored_columns:
  - "Buy / Sell Rate"
  - "Spot Rate"
  - "Market Value"
  - "Market Value Currency"
  - "Book Cost"
  - "Book Cost Currency"
# Direction for "purchase/sale" rows is determined by the debit/credit currency
# columns in the importer code, NOT by a simple type-map lookup:
#   Amount Debited = CAD, Amount Credited = BTC/ETH  → "buy"  (acquiring crypto)
#   Amount Debited = BTC/ETH, Amount Credited = CAD  → "sell" (disposing crypto)
# The importer maps the raw type to "purchase_sale" here, then resolves the
# final "buy" or "sell" direction programmatically.  Never emit "trade".
transaction_type_map:
  "purchase/sale": "purchase_sale"  # resolved to "buy" or "sell" by importer code
  "crypto cashout": "withdrawal"    # BTC sent to external wallet
  "crypto purchase": "deposit"      # BTC received from external wallet
  "fiat funding": "fiat_deposit"    # CAD bank deposit — no tax event
  "fiat cashout": "fiat_withdrawal" # CAD withdrawal — no tax event
  "shakingsats": "reward_shake"     # ShakingSats BTC loyalty reward (pre-2025 type name)
  "reward": "reward_shake"          # ShakingSats BTC loyalty reward (2025 type name)
  "shakesquads": "reward_shakesquad" # Shakesquads referral/loyalty program — separate from ShakingSats
  "card_cashback": "reward_cashback" # Shakepay Card BTC cashback
  # "interest" is NOT a distinct Shakepay Type value — interest payouts use Type="Reward"
  # with a Description like "Interest payout on CAD balance".  The importer applies
  # description_type_overrides below to sub-classify such rows as "interest".
  "buy": "buy"                      # 2025: credit-only BTC purchase; normalizer fetches BoC/CoinGecko rate for ACB
  "send": "withdrawal"              # 2025: crypto sent to external address
  "peer transfer": "other"          # Shakepay-to-Shakepay — no disposition
  "other": "other"                  # Flag for review
# Unknown types must NOT crash the importer.  Log a warning and store the
# record flagged for manual review (see parser implementation requirements).
fee_model: "spread"  # fees are embedded in the buy/sell spread, not a separate column
# sirop is BTC-only.  Any non-BTC crypto asset rows are skipped at parse
# time with a warning.  Fiat rows are always allowed.
allowed_crypto_assets:
  - BTC
# CAD and USD are the only fiat currencies Shakepay currently supports.
# Used by the importer to determine buy/sell direction for purchase/sale rows:
#   Debit=fiat + Credit=crypto → "buy"
#   Debit=crypto + Credit=fiat → "sell"
fiat_currencies:
  - CAD
  - USD
# Minimal set of CSV column names that uniquely identify this 2025 export format.
# "Buy / Sell Rate", "Spot Rate", and "Market Value Currency" are Shakepay-specific.
fingerprint_columns:
  - "Amount Debited"
  - "Asset Debited"
  - "Buy / Sell Rate"
  - "Spot Rate"
  - "Market Value Currency"
# Some Shakepay Type values (e.g. "Reward") cover multiple economic subtypes that
# are distinguished only by the Description column.  Each entry below overrides
# the canonical transaction_type when applies_to matches AND the Description
# column contains pattern (case-insensitive substring match).
# Entries are evaluated in order; the first match wins.
description_type_overrides:
  # All entries apply to "reward_shake" — the base mapping for Type="Reward".
  # Evaluated in order; first match wins.
  - applies_to: "reward_shake"    # "Bitcoin cashback" → Shakepay Card cashback
    pattern: "cashback"
    transaction_type: "reward_cashback"
  - applies_to: "reward_shake"    # "ShakeSquad" → Shakesquads referral reward
    pattern: "shakesquad"
    transaction_type: "reward_shakesquad"
  - applies_to: "reward_shake"    # "Interest payout on CAD balance" → savings interest
    pattern: "interest"
    transaction_type: "interest"
