name: "NDAX"
# NDAX ledger export (AlphaPoint APEX platform).
# Export via Reports → Create Report → CSV → Ledgers report type.
#
# The format uses a SIGNED AMOUNT column (positive = credit, negative = debit).
# There is no explicit transaction-group column; the importer groups rows that
# share the same timestamp (truncated to the second) as a single transaction.
date_column: "DATE"
# "iso8601" is a sentinel: the importer uses datetime.fromisoformat() instead
# of strptime, which handles the trailing Z and fractional seconds natively.
date_format: "iso8601"
columns:
  asset: "ASSET"
  asset_class: "ASSET_CLASS"
  amount: "AMOUNT"
  balance: "BALANCE"
  type: "TYPE"
  tx_id: "TX_ID"
  date: "DATE"
# CRITICAL: TX_ID is NDAX's internal order identifier (a short integer such as
# "10008").  It is NOT a blockchain transaction ID and MUST NOT be stored as the
# txid on the resulting RawTransaction.  The importer always sets txid=None for
# NDAX records.  Cross-source transfer matching for NDAX withdrawals relies
# entirely on amount + timestamp proximity (see transfer_match/matcher.py).
# TYPE field uses "PRIMARY / SECONDARY" notation (e.g. "TRADE / FEE").
# Keys are the normalized full type string (lowercased).  The importer looks
# up the full type first, then falls back to the primary part only.
# Rows whose secondary part is "FEE" are separated out as fee entries before
# this lookup is done.
transaction_type_map:
  "trade": "trade"
  "deposit": "deposit"
  "withdraw": "withdrawal"
  # DUST / IN is a crypto-to-crypto dust conversion: the user sends one asset
  # (embedded in _ndax_sent_asset / _ndax_sent_amount on the raw_row) and
  # receives another.  The received leg is a taxable acquisition — map to "buy"
  # so the normalizer adds it to the ACB pool at FMV.
  # NOTE: _parse_dust() looks up the primary key "dust", not the full type
  # "dust / in" or "dust / out".  The two entries below are dead config kept
  # for documentation only.
  "dust": "buy"
  "dust / in": "buy"
  "dust / out": "other"
  "staking / reward": "income"
  "staking / deposit": "transfer_out"
  "staking / refund": "transfer_in"
fee_model: "explicit"
# sirop is BTC-only.  Rows for any other crypto asset are skipped at parse
# time with a warning.  Fiat rows (ASSET_CLASS == fiat_asset_class) are
# always allowed regardless of this list.
allowed_crypto_assets:
  - BTC
# ASSET_CLASS value that identifies fiat rows.  Any other value is non-fiat.
fiat_asset_class: "FIAT"
# Maps parsing strategy names (internal Python concepts) to the primary TYPE
# values from the NDAX export that trigger each strategy.  Adding a new TYPE
# here — rather than in Python — is sufficient to route it to the right handler.
group_handlers:
  single:
    - deposit
    - withdraw
    - staking
  trade:
    - trade
  dust:
    - dust
# Minimal set of CSV column names that uniquely identify this exchange's export.
# Used by FormatDetector for auto-detection and --source validation.
# Deliberately uses all 7 columns because NDAX headers are all-uppercase and
# distinctive — no other supported exchange shares this exact header set.
fingerprint_columns:
  - "ASSET"
  - "ASSET_CLASS"
  - "AMOUNT"
  - "BALANCE"
  - "TYPE"
  - "TX_ID"
  - "DATE"
